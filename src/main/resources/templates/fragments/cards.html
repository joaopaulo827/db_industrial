<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fragment</title>
</head>
<body>

<div th:fragment="cardFerramenta(f)" class="card">
    <div class="card-body">
        <h5 th:text="${f.nome}"></h5>
        <p th:text="${f.percentualDesgaste}"></p>

        <div class="progress">
            <div class="progress-bar"
                 th:style="'width:' + ${f.percentualDesgaste} + '%'"
                 th:classappend="${f.percentualDesgaste > 80} ? ' bg-danger' :
                                (${f.percentualDesgaste > 50} ? ' bg-warning' : ' bg-success')">
            </div>
        </div>
    </div>
</div>

</body>
</html>
